# ══════════════════════════════════════════════════════════
# Mini RAG E-Learning Platform — Nginx Reverse Proxy
# Production-grade configuration for serving the FastAPI app
# ══════════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {
    # ── Basic Settings ──────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 25M;  # Matches MAX_FILE_SIZE_MB + overhead

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ── Gzip Compression ────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Rate Limiting ───────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;

    # ── Upstream (FastAPI) ──────────────────────────────
    upstream mini_rag_backend {
        server mini-rag:8000;
    }

    server {
        listen 80;
        server_name _;

        # ── Security Headers ────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Health Check ────────────────────────────────
        location /health {
            proxy_pass http://mini_rag_backend/health;
            access_log off;
        }

        # ── API Endpoints ───────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://mini_rag_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increased timeouts for AI generation
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
        }

        # ── Upload Endpoint (stricter rate limit) ───────
        location /api/upload {
            limit_req zone=upload burst=3 nodelay;

            proxy_pass http://mini_rag_backend/api/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Longer timeout for large file uploads
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
        }

        # ── Swagger Docs ────────────────────────────────
        location /docs {
            proxy_pass http://mini_rag_backend/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://mini_rag_backend/openapi.json;
            proxy_set_header Host $host;
        }

        # ── Frontend / Root ─────────────────────────────
        location / {
            proxy_pass http://mini_rag_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
