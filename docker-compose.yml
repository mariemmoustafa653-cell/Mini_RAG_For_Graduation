# ══════════════════════════════════════════════════════════
# Mini RAG E-Learning Platform — Docker Compose
# ══════════════════════════════════════════════════════════

version: "3.8"

services:
  mini-rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-rag-app
    # Ports removed: Nginx will handle external routing
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./vector_data:/app/vector_data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: mini-rag-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      mini-rag:
        condition: service_healthy
    restart: unless-stopped
